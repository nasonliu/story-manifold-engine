<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Manifold Engine - 数据监控面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --accent-cyan: #00ffd5;
            --accent-magenta: #ff00aa;
            --accent-yellow: #ffd000;
            --accent-green: #00ff88;
            --accent-red: #ff4466;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --text-muted: #555566;
            --border-color: #2a2a3a;
            --gradient-glow: linear-gradient(135deg, rgba(0,255,213,0.1), rgba(255,0,170,0.1));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0,255,213,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,0,170,0.03) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: var(--bg-primary);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            border-color: var(--accent-cyan);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-cyan);
        }

        .stat-card.magenta::before {
            background: var(--accent-magenta);
        }

        .stat-card.yellow::before {
            background: var(--accent-yellow);
        }

        .stat-card.green::before {
            background: var(--accent-green);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }

        .stat-change.up {
            background: rgba(0,255,136,0.1);
            color: var(--accent-green);
        }

        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-cyan);
            border-radius: 2px;
        }

        .card-body {
            padding: 20px 24px;
        }

        /* Language Distribution */
        .lang-bar {
            margin-bottom: 16px;
        }

        .lang-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .lang-name {
            color: var(--text-secondary);
        }

        .lang-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
        }

        .progress-track {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-fill.zh { background: var(--accent-cyan); }
        .progress-fill.en { background: var(--accent-magenta); }
        .progress-fill.classic { background: var(--accent-yellow); }
        .progress-fill.other { background: var(--accent-green); }

        /* Quality Metrics */
        .quality-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .quality-item:last-child {
            border-bottom: none;
        }

        .quality-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .quality-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 300px;
            margin: 0 20px;
        }

        .quality-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .quality-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent-green);
            transition: width 0.3s ease;
        }

        .quality-bar-fill.warning {
            background: var(--accent-yellow);
        }

        .quality-bar-fill.error {
            background: var(--accent-red);
        }

        .quality-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            min-width: 50px;
            text-align: right;
        }

        /* Recent Activity */
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            min-width: 70px;
        }

        .activity-content {
            flex: 1;
            font-size: 13px;
        }

        .activity-title {
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .activity-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Source Data Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .data-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table tr:hover td {
            background: var(--bg-secondary);
        }

        .data-table td {
            font-family: 'JetBrains Mono', monospace;
        }

        .data-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .data-badge.zh { background: rgba(0,255,213,0.15); color: var(--accent-cyan); }
        .data-badge.en { background: rgba(255,0,170,0.15); color: var(--accent-magenta); }
        .data-badge.classic { background: rgba(255,208,0,0.15); color: var(--accent-yellow); }

        /* Refresh Button */
        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .refresh-btn.loading .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">SM</div>
                <div>
                    <h1>Story Manifold Engine</h1>
                    <span>实时数据监控面板</span>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">运行中</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">
                    <span>📚</span> 总骨架数量
                </div>
                <div class="stat-value" id="total-skeletons">0</div>
                <div class="stat-sub">
                    目标: 2000 <span class="stat-change up" id="progress-percent">0%</span>
                </div>
            </div>
            <div class="stat-card magenta">
                <div class="stat-label">
                    <span>🌐</span> 数据源分布
                </div>
                <div class="stat-value" id="source-count">0</div>
                <div class="stat-sub">个来源</div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-label">
                    <span>✅</span> 有效骨架
                </div>
                <div class="stat-value" id="valid-count">0</div>
                <div class="stat-sub">通过质量检测</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">
                    <span>⚡</span> 今日提取
                </div>
                <div class="stat-value" id="today-count">0</div>
                <div class="stat-sub" id="last-update">--:--</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left Column -->
            <div>
                <!-- Language Distribution -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <div class="card-title">语言分布</div>
                    </div>
                    <div class="card-body">
                        <div class="lang-bar">
                            <div class="lang-header">
                                <span class="lang-name">中文网文</span>
                                <span class="lang-value" id="zh-percent">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill zh" id="zh-bar" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-header">
                                <span class="lang-name">英文小说</span>
                                <span class="lang-value" id="en-percent">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill en" id="en-bar" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-header">
                                <span class="lang-name">经典文学</span>
                                <span class="lang-value" id="classic-percent">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill classic" id="classic-bar" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-header">
                                <span class="lang-name">其他语言</span>
                                <span class="lang-value" id="other-percent">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill other" id="other-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quality Metrics -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">数据质量</div>
                        <button class="refresh-btn" onclick="refreshData()">
                            <span class="refresh-icon">↻</span> 刷新
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="quality-item">
                            <span class="quality-label">有效结构</span>
                            <div class="quality-bar-container">
                                <div class="quality-bar">
                                    <div class="quality-bar-fill" id="quality-structure" style="width: 0%"></div>
                                </div>
                            </div>
                            <span class="quality-value" id="quality-structure-val">0%</span>
                        </div>
                        <div class="quality-item">
                            <span class="quality-label">非模板张力曲线</span>
                            <div class="quality-bar-container">
                                <div class="quality-bar">
                                    <div class="quality-bar-fill warning" id="quality-tension" style="width: 0%"></div>
                                </div>
                            </div>
                            <span class="quality-value" id="quality-tension-val">0%</span>
                        </div>
                        <div class="quality-item">
                            <span class="quality-label">完整章节数</span>
                            <div class="quality-bar-container">
                                <div class="quality-bar">
                                    <div class="quality-bar-fill warning" id="quality-chapters" style="width: 0%"></div>
                                </div>
                            </div>
                            <span class="quality-value" id="quality-chapters-val">0%</span>
                        </div>
                        <div class="quality-item">
                            <span class="quality-label">有效情节点</span>
                            <div class="quality-bar-container">
                                <div class="quality-bar">
                                    <div class="quality-bar-fill" id="quality-beats" style="width: 0%"></div>
                                </div>
                            </div>
                            <span class="quality-value" id="quality-beats-val">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <!-- Recent Activity -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <div class="card-title">最近提取</div>
                        <span style="font-size: 12px; color: var(--text-muted);" id="recent-count">0 条</span>
                    </div>
                    <div class="card-body">
                        <div class="activity-list" id="activity-list">
                            <!-- Activity items will be populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Source Data -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">源数据概览</div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>来源</th>
                                    <th>类型</th>
                                    <th>数量</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="source-table">
                                <!-- Source data will be populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Story Manifold Engine | 数据监控面板 | 最后更新: <span id="last-refresh">--</span></p>
        </footer>
    </div>

    <script>
        // Real-time data - updated automatically
        const mockData = {
            total: 370,
            target: 2000,
            valid: 298,
            today: 192,
            lastUpdate: '11:46',
            languages: {
                zh: { count: 348, percent: 94.0 },
                en: { count: 15, percent: 4.1 },
                classic: { count: 4, percent: 1.1 },
                other: { count: 3, percent: 0.8 }
            },
            quality: {
                structure: 75,
                tension: 17,
                chapters: 65,
                beats: 87
            },
            sources: [
                { name: '中文网文', type: 'zh', count: 348, status: 'active' },
                { name: 'Project Gutenberg', type: 'en', count: 15, status: 'active' },
                { name: '经典文学', type: 'classic', count: 4, status: 'active' },
                { name: '其他来源', type: 'other', count: 3, status: 'pending' }
            ],
            recent: [
                { time: '11:46', title: '凡人修仙传', lang: 'zh', status: 'success' },
                { time: '11:45', title: 'Silone', lang: 'en', status: 'success' },
                { time: '11:44', title: '德伯雷的苔丝', lang: 'zh', status: 'success' },
                { time: '11:43', title: 'The Censor', lang: 'en', status: 'success' },
                { time: '11:42', title: '遮天', lang: 'zh', status: 'success' }
            ]
        };

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function updateUI(data) {
            // Stats
            document.getElementById('total-skeletons').textContent = formatNumber(data.total);
            document.getElementById('progress-percent').textContent = Math.round(data.total / data.target * 100) + '%';
            document.getElementById('source-count').textContent = data.sources.length;
            document.getElementById('valid-count').textContent = formatNumber(data.valid);
            document.getElementById('today-count').textContent = data.today;
            document.getElementById('last-update').textContent = '最后: ' + data.lastUpdate;

            // Languages
            document.getElementById('zh-percent').textContent = data.languages.zh.percent + '%';
            document.getElementById('zh-bar').style.width = data.languages.zh.percent + '%';
            document.getElementById('en-percent').textContent = data.languages.en.percent + '%';
            document.getElementById('en-bar').style.width = data.languages.en.percent + '%';
            document.getElementById('classic-percent').textContent = data.languages.classic.percent + '%';
            document.getElementById('classic-bar').style.width = data.languages.classic.percent + '%';
            document.getElementById('other-percent').textContent = data.languages.other.percent + '%';
            document.getElementById('other-bar').style.width = data.languages.other.percent + '%';

            // Quality
            document.getElementById('quality-structure').style.width = data.quality.structure + '%';
            document.getElementById('quality-structure-val').textContent = data.quality.structure + '%';
            document.getElementById('quality-tension').style.width = data.quality.tension + '%';
            document.getElementById('quality-tension-val').textContent = data.quality.tension + '%';
            document.getElementById('quality-chapters').style.width = data.quality.chapters + '%';
            document.getElementById('quality-chapters-val').textContent = data.quality.chapters + '%';
            document.getElementById('quality-beats').style.width = data.quality.beats + '%';
            document.getElementById('quality-beats-val').textContent = data.quality.beats + '%';

            // Recent
            document.getElementById('recent-count').textContent = data.recent.length + ' 条';
            const activityHTML = data.recent.map(item => `
                <div class="activity-item">
                    <div class="activity-time">${item.time}</div>
                    <div class="activity-content">
                        <div class="activity-title">${item.title}</div>
                        <div class="activity-meta">
                            <span class="data-badge ${item.lang}">${item.lang === 'zh' ? '中文' : item.lang === 'en' ? '英文' : '其他'}</span>
                            ${item.status === 'success' ? '✓ 成功' : '✗ 失败'}
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('activity-list').innerHTML = activityHTML;

            // Sources
            const sourceHTML = data.sources.map(source => `
                <tr>
                    <td>${source.name}</td>
                    <td><span class="data-badge ${source.type}">${source.type === 'zh' ? '中文' : source.type === 'en' ? '英文' : source.type === 'classic' ? '经典' : '其他'}</span></td>
                    <td>${formatNumber(source.count)}</td>
                    <td style="color: ${source.status === 'active' ? 'var(--accent-green)' : 'var(--text-muted)'}">${source.status === 'active' ? '● 活跃' : '○ 待处理'}</td>
                </tr>
            `).join('');
            document.getElementById('source-table').innerHTML = sourceHTML;

            // Last refresh
            const now = new Date();
            document.getElementById('last-refresh').textContent = now.toLocaleTimeString('zh-CN');
        }

        function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            
            // Simulate API call
            setTimeout(() => {
                // Update with slightly different data to simulate real-time
                mockData.total += Math.floor(Math.random() * 3);
                mockData.today += Math.floor(Math.random() * 2);
                updateUI(mockData);
                btn.classList.remove('loading');
            }, 500);
        }

        // Initialize
        updateUI(mockData);

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
